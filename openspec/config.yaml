schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
# Add your tech stack, conventions, style guides, domain knowledge, etc.
context: |
  Tech stack: Tauri 2.0 (Rust + React/TypeScript), Python (uv, Jupyter)
  Frontend: React 19, TypeScript 5.8, Vite 7, pnpm
  Backend: Rust with Tauri 2.0
  Domain: Desktop Python development environment with bundled Jupyter
  Project goal: Zero-configuration Python learning environment
  Environment Management: The entire development environment must be activated using `nix develop` to ensure dependency consistency and zero-configuration setup.
# Per-artifact rules (optional)
# Add custom rules for specific artifacts.
rules:
  proposal:
    - Keep proposals small and focused; split large changes into multiple proposals
    - Each proposal should address a single concern or feature
    - If a change touches more than 5 files or requires extensive refactoring, split it
    - Include clear scope boundaries and explicit "out of scope" items
  tasks:
    - Maximum 30 tasks per task list
    - 'If the total number of planned tasks exceeds 24, you must pause and ask the user: "The number of tasks has exceeded the limit of 24. Would you like to split this into multiple phases or separate change proposals?" Proceed with splitting only after receiving user confirmation.'
    - Each task should be completable in 1-2 hours
    - Group related tasks into logical phases when possible
